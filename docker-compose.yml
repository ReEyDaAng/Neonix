services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: neonix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7

  backend:
    build:
      context: ./backend
    environment:
      PORT: "4000"
      CORS_ORIGIN: "http://localhost:3000,http://127.0.0.1:3000"
      JWT_SECRET: "dev_secret_change_me"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/neonix?schema=public"
      DIRECT_URL: "postgresql://postgres:postgres@postgres:5432/neonix?schema=public"
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && node dist/main.js"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:4000"
      NEXT_PUBLIC_WS_URL: "http://localhost:4000"
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data:
